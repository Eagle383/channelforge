{% extends "base.html" %}
{% block content %}
<h1>Settings</h1>
<form method="post" action="/settings">
  <h2>Channels DVR</h2>
  <div class="grid">
    <label>Server URL(s), comma-separated for multiple <input name="channels_dvr_url" value="{{ s['channels_dvr_url'] }}" placeholder="http://192.168.1.10:8089, http://192.168.1.20:8089"></label>
    <label>Status <span class="badge {{ 'ok' if 'ok' in dvr_status and 'error' not in dvr_status and 'unreachable' not in dvr_status else 'bad' }}">{{ dvr_status }}</span></label>
    <label>Push outputs to DVR after each refresh
      <select name="push_outputs_to_dvr">
        <option value="0" {{ 'selected' if s['push_outputs_to_dvr'] != '1' }}>Off</option>
        <option value="1" {{ 'selected' if s['push_outputs_to_dvr'] == '1' }}>On</option>
      </select>
    </label>
  </div>
  <h2>Outputs</h2>
  <div class="grid">
    <label>Max channels per m3u <input name="output_max_per_m3u" type="number" value="{{ s['output_max_per_m3u'] }}"></label>
    <label>External base URL of this app (blank = auto) <input name="base_url" value="{{ s['base_url'] }}" placeholder="http://192.168.1.10:5100"></label>
    <label>Auto-number channels starting at (blank = keep source numbers; saved onto each channel, OTA x.y numbers kept) <input name="output_start_number" value="{{ s['output_start_number'] }}" placeholder="1000"></label>
  </div>
  <h2>Assignments</h2>
  <div class="grid">
    <label>Manual assign/ignore also creates a matching rule
      <select name="auto_rule_on_assign">
        <option value="1" {{ 'selected' if s['auto_rule_on_assign'] != '0' }}>On</option>
        <option value="0" {{ 'selected' if s['auto_rule_on_assign'] == '0' }}>Off</option>
      </select>
    </label>
    <label>Auto-assign by normalized name ("123 GO!" = "123GO!")
      <select name="auto_assign_normalized">
        <option value="1" {{ 'selected' if s['auto_assign_normalized'] != '0' }}>On</option>
        <option value="0" {{ 'selected' if s['auto_assign_normalized'] == '0' }}>Off</option>
      </select>
    </label>
    <label>Auto-create channels when nothing matches
      <select name="auto_create_channels">
        <option value="0" {{ 'selected' if s['auto_create_channels'] != '1' }}>Off</option>
        <option value="1" {{ 'selected' if s['auto_create_channels'] == '1' }}>On</option>
      </select>
    </label>
  </div>
  <h2>Pre-refresh hook</h2>
  <div class="grid">
    <label>FastChannels server address — its force-refresh is POSTed before each refresh so the feeds rebuild first (blank = off; a full URL to any other hook works too)
      <input name="prerefresh_url" value="{{ s['prerefresh_url'] }}" placeholder="192.168.1.10:5523"></label>
    <label>Minutes to wait after the hook before fetching sources
      <input name="prerefresh_wait_min" type="number" value="{{ s['prerefresh_wait_min'] }}" placeholder="30"></label>
  </div>
  <h2>Health checks</h2>
  <div class="grid">
    <label>Mark unhealthy after N consecutive fails <input name="health_fail_threshold" type="number" value="{{ s['health_fail_threshold'] }}"></label>
    <label>Concurrency <input name="health_concurrency" type="number" value="{{ s['health_concurrency'] }}"></label>
  </div>
  <h2>Daily schedule (HH:MM, 24h; blank = off)</h2>
  <div class="grid">
    <label>Time zone (IANA name; blank = server default) — schedule clock now reads <span class="badge">{{ tznow }}</span>
      <input name="timezone" value="{{ s['timezone'] }}" placeholder="America/Chicago"></label>
    <label>Stream health checks (before refresh, so it fails over dead streams) <input name="schedule.health" value="{{ s['schedule.health'] }}" placeholder="01:00"></label>
    <label>Refresh sources &amp; outputs <input name="schedule.refresh" value="{{ s['schedule.refresh'] }}" placeholder="01:30"></label>
    <label>Refresh DVR m3u sources <input name="schedule.refresh_dvr_m3u" value="{{ s['schedule.refresh_dvr_m3u'] }}" placeholder="03:00"></label>
    <label>Reset DVR passes <input name="schedule.reset_passes" value="{{ s['schedule.reset_passes'] }}" placeholder="04:00"></label>
  </div>
  <p><button>Save settings</button></p>
</form>
{% endblock %}
